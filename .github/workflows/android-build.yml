name: 🤖 Android Build & Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: 🏗️ Build APKs & Create Release
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 📝 Setup environment
        run: |
          # إنشاء ملف .env لتجنب أخطاء البناء إذا كان مفقوداً
          if [ ! -f ".env" ]; then
            touch .env
          fi

      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 🚀 Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: 🏷️ Generate Release Tag
        id: tag
        run: echo "release_tag=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apks-${{ steps.tag.outputs.release_tag }}
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "🚀 الإصدار ${{ steps.tag.outputs.release_tag }}"
          body: "تم بناء هذا الإصدار تلقائياً عبر GitHub Actions 🤖."
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: 🤖 Android Build & Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: 📝 Setup environment files (.env & debug.keystore)
        run: |
          if [ -f ".env.example" ] && [ ! -f ".env" ]; then
            cp .env.example .env
          elif [ ! -f ".env" ]; then
            touch .env
          fi
          
          if [ ! -f "debug.keystore" ]; then
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: 🤖 Accept Android SDK Licenses
        run: |
          mkdir -p "$ANDROID_HOME/licenses"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$ANDROID_HOME/licenses/android-sdk-license"
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > "$ANDROID_HOME/licenses/android-sdk-preview-license"
          echo "android.allowUntrustedChannel=true" >> gradle.properties

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"

      - name: 🏷️ Generate Release Tag
        id: tag
        run: echo "release_tag=v$(date +'%Y.%m.%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK-Debug
          path: app/build/outputs/apk/debug/*.apk

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "🚀 الإصدار ${{ steps.tag.outputs.release_tag }}"
          body: "تم بناء هذا الإصدار تلقائياً عبر GitHub Actions 🤖.\n\nتتضمن المرفقات نسخة `debug` الجاهزة للتثبيت مباشرة على هاتفك."
          files: app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
